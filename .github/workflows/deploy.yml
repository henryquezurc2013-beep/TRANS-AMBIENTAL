name: Deploy to Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL != '' && secrets.FTP_PROTOCOL || 'ftps' }}
      FTP_PORT: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || '21' }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR != '' && secrets.FTP_SERVER_DIR || '/domains/transambientalcontainer.com.br/public_html/' }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate app secrets
        run: |
          test -n "$VITE_SUPABASE_URL" || (echo "Missing GitHub secret: VITE_SUPABASE_URL" && exit 1)
          test -n "$VITE_SUPABASE_ANON_KEY" || (echo "Missing GitHub secret: VITE_SUPABASE_ANON_KEY" && exit 1)

      - name: Create production env file
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env.production
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env.production

      - name: Build
        run: npm run build

      - name: Create SPA .htaccess
        run: |
          {
            echo 'Options -Indexes'
            echo '<IfModule mod_rewrite.c>'
            echo '  RewriteEngine On'
            echo '  RewriteBase /'
            echo '  RewriteRule ^index\.html$ - [L]'
            echo '  RewriteCond %{REQUEST_FILENAME} !-f'
            echo '  RewriteCond %{REQUEST_FILENAME} !-d'
            echo '  RewriteRule . /index.html [L]'
            echo '</IfModule>'
          } > dist/.htaccess

      - name: Validate FTP secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          test -n "$FTP_HOST" || (echo "Missing GitHub secret: FTP_HOST" && exit 1)
          test -n "$FTP_USER" || (echo "Missing GitHub secret: FTP_USER" && exit 1)
          test -n "$FTP_PASS" || (echo "Missing GitHub secret: FTP_PASS" && exit 1)

      - name: Show deploy target
        run: |
          echo "FTP host: ${{ secrets.FTP_HOST }}"
          echo "FTP user: ${{ secrets.FTP_USER }}"
          echo "FTP protocol: $FTP_PROTOCOL"
          echo "FTP port: $FTP_PORT"
          echo "FTP server dir: $FTP_SERVER_DIR"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ${{ env.FTP_PROTOCOL }}
          port: ${{ env.FTP_PORT }}
          local-dir: dist/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          timeout: 120000
          dangerous-clean-slate: false
          dry-run: false
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
